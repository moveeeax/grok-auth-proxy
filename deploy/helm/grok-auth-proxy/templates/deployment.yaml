apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grok-auth-proxy.fullname" . }}
  labels:
    {{- include "grok-auth-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "grok-auth-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.auth.existingSecret }}
        checksum/auth: {{ .Values.auth.existingSecret | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "grok-auth-proxy.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "grok-auth-proxy.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      {{- if and .Values.auth.existingSecret .Values.auth.seedToDataVolume }}
      initContainers:
        - name: seed-auth
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              DEST="{{ .Values.config.authFile }}"
              SRC="/bootstrap/auth.json"
              mkdir -p "$(dirname "$DEST")"
              # Seed only if missing so token refresh write-back is preserved across restarts.
              if [ ! -s "$DEST" ]; then
                echo "seeding $DEST from secret"
                cp "$SRC" "$DEST"
                chmod 600 "$DEST"
              else
                echo "keeping existing $DEST"
              fi
              chown -R 65532:65532 /data || true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: auth-bootstrap
              mountPath: /bootstrap
              readOnly: true
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
      {{- end }}
      containers:
        - name: grok-auth-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "grok-auth-proxy.fullname" . }}
          env:
            - name: GAP_SERVER_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.admin.existingSecret }}{{ .Values.admin.existingSecret }}{{ else }}{{ include "grok-auth-proxy.fullname" . }}-admin{{ end }}
                  key: {{ .Values.admin.secretKey }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "grok-auth-proxy.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if and .Values.auth.existingSecret .Values.auth.seedToDataVolume }}
        - name: auth-bootstrap
          secret:
            secretName: {{ .Values.auth.existingSecret }}
            items:
              - key: {{ .Values.auth.secretKey }}
                path: auth.json
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
