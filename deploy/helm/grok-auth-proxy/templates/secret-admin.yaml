{{- if not .Values.admin.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grok-auth-proxy.fullname" . }}-admin
  labels:
    {{- include "grok-auth-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.admin.secretKey }}: {{ required "admin.value or admin.existingSecret is required" .Values.admin.value | quote }}
{{- end }}
