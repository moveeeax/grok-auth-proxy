# Single-replica by default: SQLite + local auth.json write-back is not multi-writer safe.
replicaCount: 1

image:
  repository: moveeeax/grok-auth-proxy
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: grok-proxy.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Non-secret configuration (rendered into ConfigMap / env)
config:
  serverAddr: ":8080"
  # Writable path on the data PVC (seeded from Secret via init container).
  authFile: /data/auth.json
  upstreamBase: https://api.x.ai/v1
  refreshSkew: 5m
  # Optional fallbacks if auth.json lacks oidc_client_id / oidc_issuer (Grok CLI fields).
  issuer: ""
  clientId: ""
  dbDriver: sqlite
  dbDsn: /data/proxy.db
  rateLimitRps: "10"
  rateLimitBurst: "20"
  logLevel: info
  logRedact: "true"
  metricsEnabled: "true"

# Admin key: create a Secret and reference it here.
admin:
  existingSecret: ""
  secretKey: admin-key
  # Only for local/dev — prefer existingSecret in production.
  value: ""

# Grok auth.json bootstrap Secret → seeded onto data PVC (writable).
auth:
  existingSecret: ""
  secretKey: auth.json
  seedToDataVolume: true

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Extra env vars
extraEnv: []
